/* ==============================
   ENROLLED COURSE CHECK
================================ */

async function loadEnrolledBatchSlugsaf() {
  const backend = getBatchBackendaf();
  const student = getCurrentStudentaf();

  afEnrolledCourseSlugs = [];

  if (!backend || !student.id) {
    return [];
  }

  try {
    const { data, error } = await backend
      .from("student_courses")
      .select(`
        status,
        courses (
          slug
        )
      `)
      .eq("student_id", student.id)
      .eq("status", "active");

    if (error) {
      console.error("Enrolled batch check error:", error);
      return [];
    }

    afEnrolledCourseSlugs = (data || [])
      .map(function (row) {
        return row.courses && row.courses.slug ? row.courses.slug : "";
      })
      .filter(Boolean);

    return afEnrolledCourseSlugs;

  } catch (err) {
    console.error("loadEnrolledBatchSlugsaf error:", err);
    return [];
  }
}

}

function showBatchListaf() {
  const list = afBatchEl("batchListBoxaf");
  const details = afBatchEl("batchDetailsBoxaf");

  if (details) {
    details.classList.add("hidden-box");
    details.style.display = "none";
  }

  if (list) {
    list.classList.remove("hidden-box");
    list.style.display = "block";
  }
}

function backToBatchListaf() {
  showBatchListaf();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

function renderBatchesaf(list) {
  const box = afBatchEl("batchCardsaf");
  const count = afBatchEl("batchCountTextaf");

  if (!box) return;

  if (count) {
    count.textContent = list.length + " batches available";
  }

  if (!list.length) {
    box.innerHTML = '<p class="empty-textaf">No batch found.</p>';
    return;
  }

  box.innerHTML = list.map(function (batch) {
    const enrolled = isBatchEnrolledaf(batch.courseSlug);

    return `
      <div class="batch-cardaf ${enrolled ? "batch-enrolled-cardaf" : ""}">
        <div class="batch-img-wrapaf" onclick="openBatchDetailsaf('${batch.id}')">
          <span class="batch-loaderaf"></span>
          <img
            class="batch-imgaf"
            src="${batch.image}"
            alt="${batch.title}"
            loading="lazy"
            onload="this.previousElementSibling.style.display='none'"
            onerror="this.previousElementSibling.style.display='none'"
          >
        </div>

        <div class="batch-card-bodyaf">
          <div class="batch-card-metaaf">
            <p class="batch-categoryaf">${batch.category}</p>
            <span class="batch-languageaf">${batch.language}</span>
          </div>

          <h3 class="batch-titleaf" onclick="openBatchDetailsaf('${batch.id}')">
            ${batch.title}
          </h3>

          <p class="batch-subaf">${batch.subtitle}</p>

          <div class="batch-statusaf">
            <span class="batch-dotaf"></span>
            <span>${enrolled ? "Enrolled" : batch.status}</span>
            <span>|</span>
            <span>${enrolled ? "Access active" : batch.startText}</span>
          </div>

          ${enrolled ? `<div class="batch-enrolled-tagaf">✓ Already Enrolled</div>` : ""}

          <div class="batch-price-actionaf">
            <div class="batch-priceaf">
              <div class="batch-price-lineaf">
                <strong>₹${batch.price}</strong>
                <del>₹${batch.oldPrice}</del>
              </div>
              <span class="batch-offaf">${afBatchDiscount}% OFF</span>
            </div>

            <div class="batch-buy-rowaf">
              ${
                enrolled
                  ? `<button class="batch-buy-btnaf batch-enrolled-btnaf" type="button" disabled>
                      Already Enrolled
                    </button>`
                  : `<button class="batch-buy-btnaf" type="button" onclick="buyBatchDirectaf('${batch.id}')">
                      Buy Now
                    </button>`
              }

              <button class="batch-arrowaf" type="button" onclick="openBatchDetailsaf('${batch.id}')">
                ›
              </button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function filterBatchesaf() {
  const input = afBatchEl("batchSearchInputaf");
  const query = input ? input.value.trim().toLowerCase() : "";

  if (!query) {
    renderBatchesaf(afBatches);
    return;
  }

  const filtered = afBatches.filter(function (batch) {
    return (
      batch.title.toLowerCase().includes(query) ||
      batch.subtitle.toLowerCase().includes(query) ||
      batch.courseSlug.toLowerCase().includes(query)
    );
  });

  renderBatchesaf(filtered);
}

/* ==============================
   BATCH DETAILS
================================ */

function openBatchDetailsaf(batchId) {
  const batch = afBatches.find(function (item) {
    return item.id === batchId;
  });

  if (!batch) {
    alert("Batch not found.");
    return;
  }

  afSelectedBatch = batch;

  const list = afBatchEl("batchListBoxaf");
  const details = afBatchEl("batchDetailsBoxaf");

  if (list) {
    list.classList.add("hidden-box");
    list.style.display = "none";
  }

  if (details) {
    details.classList.remove("hidden-box");
    details.style.display = "block";
  }

  const img = afBatchEl("batchDetailImageaf");
  const category = afBatchEl("batchDetailCategoryaf");
  const language = afBatchEl("batchDetailLanguageaf");
  const title = afBatchEl("batchDetailTitleaf");
  const desc = afBatchEl("batchDetailDescaf");
  const price = afBatchEl("batchDetailPriceaf");
  const oldPrice = afBatchEl("batchDetailOldPriceaf");
  const off = afBatchEl("batchDetailOffaf");
  const learn = afBatchEl("batchLearnListaf");
  const facilities = afBatchEl("batchFacilityListaf");
  const fullDetails = afBatchEl("batchFullDetailsaf");
  const detailBuyBtn = afBatchEl("batchDetailBuyBtnaf");

  const enrolled = isBatchEnrolledaf(batch.courseSlug);

  if (img) img.src = batch.image;
  if (category) category.textContent = batch.category;
  if (language) language.textContent = batch.language;
  if (title) title.textContent = batch.title;
  if (desc) desc.textContent = batch.subtitle;
  if (price) price.textContent = "₹" + batch.price;
  if (oldPrice) oldPrice.textContent = "₹" + batch.oldPrice;
  if (off) off.textContent = afBatchDiscount + "% OFF";
  if (fullDetails) fullDetails.textContent = batch.details;

  if (learn) {
    learn.innerHTML = batch.learn.map(function (item) {
      return `<li>${item}</li>`;
    }).join("");
  }

  if (facilities) {
    facilities.innerHTML = batch.facilities.map(function (item) {
      return `<li>${item}</li>`;
    }).join("");
  }

  if (detailBuyBtn) {
    if (enrolled) {
      detailBuyBtn.textContent = "Already Enrolled";
      detailBuyBtn.disabled = true;
      detailBuyBtn.classList.add("batch-enrolled-btnaf");
    } else {
      detailBuyBtn.textContent = "Buy Now";
      detailBuyBtn.disabled = false;
      detailBuyBtn.classList.remove("batch-enrolled-btnaf");
    }
  }

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

/* ==============================
   BUY BUTTONS
================================ */

function buyBatchDirectaf(batchId) {
  const batch = afBatches.find(function (item) {
    return item.id === batchId;
  });

  if (!batch) {
    alert("Batch not found.");
    return;
  }

  if (isBatchEnrolledaf(batch.courseSlug)) {
    alert("You are already enrolled in this batch.");
    return;
  }

  afSelectedBatch = batch;
  startBatchPaymentaf(batch);
}

function buySelectedBatchaf() {
  if (!afSelectedBatch) {
    alert("Please select a batch first.");
    return;
  }

  if (isBatchEnrolledaf(afSelectedBatch.courseSlug)) {
    alert("You are already enrolled in this batch.");
    return;
  }

  startBatchPaymentaf(afSelectedBatch);
}

/* ==============================
   RAZORPAY CHECKOUT
================================ */

function startBatchPaymentaf(batch) {
  const backend = getBatchBackendaf();
  const student = getCurrentStudentaf();

  if (!backend) {
    alert("Student backend not connected.");
    return;
  }

  if (!student.id) {
    alert("Please login before purchasing this batch.");
    return;
  }

  if (typeof Razorpay === "undefined") {
    alert("Razorpay checkout script not loaded. Add checkout.js script before this JS.");
    return;
  }

  const amountInPaise = Number(batch.price) * 100;

  const options = {
    key: RAZORPAY_KEY_ID,
    amount: amountInPaise,
    currency: "INR",
    name: "AcademeForge",
    description: batch.title,
    image: "",
    prefill: {
      name: student.name,
      email: student.email,
      contact: student.mobile
    },
    notes: {
      student_uuid: student.id,
      course_slug: batch.courseSlug,
      batch_id: batch.id,
      batch_title: batch.title
    },
    theme: {
      color: "#16a34a"
    },
    handler: async function (response) {
      console.log("Razorpay payment success:", response);

      await saveBatchPaymentaf(batch, response);

      const accessAdded = await grantBatchAccessaf(batch.courseSlug);

      if (accessAdded) {
        await loadEnrolledBatchSlugsaf();

        alert("Payment successful! Batch access added.");

        refreshStudentCoursesAfterPurchaseaf(student);

        renderBatchesaf(afBatches);

        backToBatchListaf();
      }
    },
    modal: {
      ondismiss: function () {
        console.log("Razorpay checkout closed.");
      }
    }
  };

  const razorpayCheckout = new Razorpay(options);

  razorpayCheckout.on("payment.failed", function (response) {
    console.error("Razorpay failed:", response);

    let message = "Payment failed. Please try again.";

    if (
      response &&
      response.error &&
      response.error.description
    ) {
      message = response.error.description;
    }

    alert(message);
  });

  razorpayCheckout.open();
}

/* ==============================
   OPTIONAL PAYMENT RECORD
   Table nahi hai to silently skip
================================ */

async function saveBatchPaymentaf(batch, razorpayResponse) {
  const backend = getBatchBackendaf();
  const student = getCurrentStudentaf();

  if (!backend) {
    console.log("Backend not connected. Payment record skipped.");
    return false;
  }

  if (!student.id) {
    console.log("Student UUID missing. Payment record skipped.");
    return false;
  }

  try {
    const { error } = await backend
      .from("batch_payments_af")
      .insert([
        {
          student_id: student.id,
          course_slug: batch.courseSlug,
          batch_id: batch.id,
          batch_title: batch.title,
          amount: batch.price,
          currency: "INR",
          razorpay_payment_id: razorpayResponse.razorpay_payment_id || "",
          status: "paid"
        }
      ]);

    if (error) {
      console.log("Payment record skipped:", error.message);
      return false;
    }

    return true;

  } catch (err) {
    console.log("Payment record error skipped:", err.message);
    return false;
  }
}

/* ==============================
   AFTER PAYMENT SUCCESS
   Add access in student_courses
================================ */

async function grantBatchAccessaf(courseSlug) {
  const backend = getBatchBackendaf();
  const student = getCurrentStudentaf();

  if (!backend) {
    alert("Payment successful, but student backend is not connected.");
    return false;
  }

  if (!student.id) {
    alert("Payment successful, but student login session was not found.");
    return false;
  }

  try {
    const { data: courseData, error: courseError } = await backend
      .from("courses")
      .select("id, title, slug")
      .eq("slug", courseSlug)
      .single();

    if (courseError || !courseData) {
      console.error("Course find error:", courseError);
      alert("Payment successful, but course was not found.");
      return false;
    }

    const { data: existingAccess, error: existingError } = await backend
      .from("student_courses")
      .select("id, status")
      .eq("student_id", student.id)
      .eq("course_id", courseData.id)
      .maybeSingle();

    if (existingError) {
      console.error("Existing access check error:", existingError);
      alert("Payment successful, but access check failed: " + existingError.message);
      return false;
    }

    if (existingAccess && existingAccess.id) {
      const { error: updateError } = await backend
        .from("student_courses")
        .update({
          status: "active"
        })
        .eq("id", existingAccess.id);

      if (updateError) {
        console.error("Access update error:", updateError);
        alert("Payment successful, but access update failed: " + updateError.message);
        return false;
      }

      return true;
    }

    const { error: insertError } = await backend
      .from("student_courses")
      .insert([
        {
          student_id: student.id,
          course_id: courseData.id,
          status: "active"
        }
      ]);

    if (insertError) {
      console.error("Access insert error:", insertError);
      alert("Payment successful, but access could not be added: " + insertError.message);
      return false;
    }

    return true;

  } catch (err) {
    console.error("grantBatchAccessaf error:", err);
    alert("Payment successful, but access update failed: " + err.message);
    return false;
  }
}

function refreshStudentCoursesAfterPurchaseaf(student) {
  if (typeof loadStudentCoursesaf === "function") {
    loadStudentCoursesaf(student);
    return;
  }

  if (typeof loadStudentCourses === "function") {
    loadStudentCourses(student);
    return;
  }

  console.log("Course refresh function not found.");
}

/* ==============================
   AUTO RENDER IF SECTION EXISTS
================================ */

document.addEventListener("DOMContentLoaded", async function () {
  const batchSection = afBatchEl("batchaf");

  if (batchSection) {
    await loadEnrolledBatchSlugsaf();
    renderBatchesaf(afBatches);
  }
});
  
  </script>
